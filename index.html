<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma de configuración electrónica v18</title>
<style>
:root {
  --bg:#f1f5f9;--card:#ffffff;--ink:#0f172a;--muted:#64748b;--line:#cbd5e1;--line2:#e2e8f0;
  --indigo:#4f46e5;--green:#059669;--red:#dc2626;--amber:#f59e0b;--blue:#0284c7;--slate:#334155;
  --shadow:0 10px 26px rgba(15,23,42,.08);
}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font-family:Segoe UI,Roboto,Arial,sans-serif}
header{background:linear-gradient(135deg,#4338ca,#0f766e);color:#fff;text-align:center;padding:10px 16px;box-shadow:0 4px 16px rgba(15,23,42,.18)}
header h1{margin:0;font-size:clamp(1.25rem,2.3vw,1.75rem)}
main{max-width:1220px;margin:8px auto;padding:0 10px 8px}.layout{display:grid;grid-template-columns:1.45fr .88fr;gap:10px}.panel{background:var(--card);border:1px solid var(--line2);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.panel-head{padding:7px 10px;background:#f8fafc;border-bottom:1px solid var(--line2);display:flex;justify-content:space-between;gap:6px;align-items:center;flex-wrap:wrap}.panel-head h2{font-size:1rem;margin:0}.btn-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
button{border:0;border-radius:999px;padding:6px 10px;font-weight:800;cursor:pointer;background:#e2e8f0;color:#0f172a;transition:.15s ease;white-space:nowrap;font-size:.88rem}button:hover{filter:brightness(.96);transform:translateY(-1px)}button.primary{background:var(--indigo);color:white}button.good{background:var(--green);color:white}button.warn{background:var(--amber);color:#1f2937}button.blue{background:var(--blue);color:white}button.ghost{background:#fff;border:1px solid var(--line);color:#334155}button.red{background:var(--red);color:#fff}
.stage{height:calc(100vh - 82px);min-height:560px;display:flex;flex-direction:column}.stage-body{padding:9px;display:grid;grid-template-rows:auto minmax(0,1fr);gap:8px;min-height:0;flex:1}.prompt-card{background:linear-gradient(180deg,#ffffff,#f8fafc);border:1px solid var(--line2);border-radius:14px;padding:10px;display:grid;grid-template-columns:92px 1fr;gap:10px;align-items:center;min-height:104px}.prompt-card.home{display:block;min-height:auto;text-align:center}.prompt-card.compact-intro{min-height:0;padding:6px 9px;border-radius:12px}.prompt-card.compact-intro .mini-title{font-weight:900;font-size:.92rem;margin:0}.prompt-card.compact-intro .mini-sub{font-size:.76rem;color:var(--muted);margin:2px 0 0;line-height:1.15}
.atom-badge{width:86px;height:86px;border-radius:18px;border:2px solid #93c5fd;background:#dbeafe;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:inset 0 2px 8px rgba(255,255,255,.85);margin:auto}.atom-badge .sym{font-size:2.05rem;font-weight:900;color:#1d4ed8;line-height:1}.atom-badge .z{font-size:.75rem;font-weight:900;color:#334155;margin-top:3px}.prompt-main h3{margin:.05rem 0 .25rem;font-size:1.18rem}.chips{display:flex;flex-wrap:wrap;gap:5px}.chip{display:inline-flex;align-items:center;gap:3px;background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;border-radius:999px;padding:3px 7px;font-size:.74rem;font-weight:800}.chip.gray{background:#f1f5f9;color:#475569;border-color:#cbd5e1}.chip.good{background:#dcfce7;color:#166534;border-color:#bbf7d0}.chip.warn{background:#fef3c7;color:#92400e;border-color:#fde68a}
.work-card{border:1px solid var(--line2);border-radius:14px;padding:10px;background:#fff;min-height:0;overflow-y:auto;max-height:none;scroll-behavior:smooth}.work-card h3{margin:.05rem 0 .55rem}.small{font-size:.79rem;color:var(--muted)}.muted{color:var(--muted)}
.home-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:6px}.home-card{border:1px solid var(--line2);border-radius:12px;background:#fff;padding:10px 11px;text-align:left;box-shadow:0 3px 10px rgba(15,23,42,.05);display:flex;flex-direction:column;gap:5px}.home-card h3{margin:0;font-size:.96rem;line-height:1.12}.home-card p{color:var(--muted);font-size:.78rem;line-height:1.16;margin:0}.home-card button{align-self:flex-start;margin-top:2px;padding:5px 9px;font-size:.78rem}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}label{display:block;font-weight:800;font-size:.72rem;color:#475569;text-transform:uppercase;letter-spacing:.035em;margin-bottom:3px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:9px;background:white;padding:6px 8px;font:inherit;color:var(--ink);outline:none}textarea{resize:vertical;min-height:62px}select:focus,input:focus,textarea:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.feedback{border-radius:10px;padding:6px 8px;margin-top:6px;font-size:.84rem;line-height:1.22}.feedback.good{background:#dcfce7;border:1px solid #86efac;color:#14532d}.feedback.bad{background:#fee2e2;border:1px solid #fecaca;color:#7f1d1d}.feedback.warn{background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12}.formula{font-family:Consolas,Menlo,monospace;background:#0f172a;color:#f8fafc;border-radius:9px;padding:3px 5px;display:inline-block;line-height:1.25;max-width:100%;overflow-x:auto}.formula.light{background:#f8fafc;color:#0f172a;border:1px solid var(--line2)}
.board-history{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}.board-result{background:#fff7ed;border:1px solid #fed7aa;border-left:4px solid var(--red);border-radius:10px;padding:6px 8px;line-height:1.25;font-size:.9rem}.result-inline{color:var(--red);font-weight:900}.current-step{border-top:1px dashed var(--line);padding-top:8px}
.tutor{height:calc(100vh - 82px);min-height:560px;display:flex;flex-direction:column}.chat-head{background:#e2e8f0;padding:4px 8px;font-weight:900;border-bottom:1px solid var(--line);font-size:.86rem}.chat-box{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px;background:#f8fafc;scroll-behavior:smooth}.msg{border-radius:8px;padding:3px 5px;margin-bottom:2px;box-shadow:0 1px 3px rgba(15,23,42,.04);font-size:.79rem;line-height:1.12}.msg.tutor-msg{background:#fff;border:1px solid var(--line2)}.msg.user{background:#e0e7ff;border:1px solid #c7d2fe}.case-divider{text-align:center;color:#334155;font-weight:900;font-size:.68rem;background:#e2e8f0;border:1px solid #cbd5e1;border-radius:999px;padding:2px 6px;margin:3px 0}.input-area{border-top:1px solid var(--line2);padding:4px 6px;background:white}.footer-note{font-size:.70rem;color:#64748b;text-align:center;margin-top:6px;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:8px;line-height:1.2}.footer-note img{height:18px;display:inline-block;vertical-align:middle}.footer-note a{color:#334155;text-decoration:none;font-weight:800}.footer-note a:hover{color:#0284c7;text-decoration:underline}.fade-in{animation:fade .22s ease-out}@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.box-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}.orb-box{min-width:48px;border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center;background:#f8fafc}.orb-label{font-size:.72rem;font-weight:800;color:#64748b}.arrow-box{font-size:1.25rem;min-height:1.5rem}.table{width:100%;border-collapse:separate;border-spacing:0 6px}.table th{text-align:left;font-size:.75rem;color:#64748b;text-transform:uppercase}.table td{background:#f8fafc;border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);padding:8px}.table td:first-child{border-left:1px solid var(--line2);border-radius:10px 0 0 10px}.table td:last-child{border-right:1px solid var(--line2);border-radius:0 10px 10px 0}

.work-card p,.prompt-main p{margin:.35rem 0}.work-card ul,.work-card ol{margin:.35rem 0 .45rem 1.1rem;padding-left:.7rem}.work-card li{margin:.18rem 0}
@media (max-width:980px){.layout{grid-template-columns:1fr}.stage,.tutor{height:auto;min-height:0}.tutor{height:500px}.grid4,.grid3,.grid2,.home-grid{grid-template-columns:1fr}}
@media (max-width:600px){header{padding:7px 10px}.prompt-card{grid-template-columns:1fr;min-height:auto}.atom-badge{width:78px;height:78px}.work-card{padding:8px}}

/* Ajuste extra: instrucciones de cajas más explícitas sin aumentar altura */
.feedback.warn{font-size:.82rem;line-height:1.12;padding:6px 8px;margin-top:5px;margin-bottom:4px}
.feedback.warn .small{font-size:.79rem;line-height:1.08;color:#7c2d12}
.work-card h3{margin:0 0 6px;font-size:1.08rem}
.work-card p{margin:4px 0;line-height:1.18}
.grid2{gap:6px}
label{margin-bottom:3px;font-size:.68rem;line-height:1.05}
input,select,textarea{padding:6px 8px;min-height:34px}
.state-ground-label{text-transform:none!important;letter-spacing:0!important;font-size:.76rem!important;line-height:1.08!important;color:#334155!important}
.btn-row{gap:5px}


/* Compactación específica del bloque de números cuánticos */
.prompt-card.quantum-intro{min-height:0;padding:5px 8px;border-radius:12px}
.prompt-card.quantum-intro .mini-title{font-weight:900;font-size:.92rem;margin:0;line-height:1.05}
.prompt-card.quantum-intro .mini-sub{font-size:.75rem;color:var(--muted);margin:2px 0 0;line-height:1.08}
.quantum-work h3{margin:0 0 4px;font-size:1.06rem;line-height:1.08}
.quantum-work .q-question{margin:0 0 4px;line-height:1.13;font-size:.92rem}
.quantum-help{background:#eef2ff;border:1px solid #c7d2fe;color:#312e81;border-radius:9px;padding:4px 6px;margin:3px 0 6px;font-size:.76rem;line-height:1.12}
.quantum-help .formula.light{font-size:.72rem;padding:1px 3px;border-radius:5px;vertical-align:baseline}
.q-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:5px 7px;margin-top:2px}
.q-field label,.q-label{text-transform:none!important;letter-spacing:0!important;font-size:.77rem!important;line-height:1.05!important;margin-bottom:2px!important;color:#334155!important}
.q-field input{min-height:31px;padding:4px 7px}
.quantum-actions{margin-top:6px!important}
@media (min-width:1100px){.q-grid.many{grid-template-columns:repeat(3,minmax(0,1fr))}}





/* Selector de elementos en formato de tabla periódica: casillas estrechas a lo ancho */
.periodic-picker-wrap{margin-top:8px;overflow-x:auto;max-width:100%}
.periodic-grid{display:grid;grid-template-columns:repeat(18,30px);gap:2px;align-items:stretch;justify-content:start}
.group-head{display:flex;align-items:center;justify-content:center;width:30px;min-width:30px;max-width:30px;min-height:17px;border:1px solid #c7d2fe;border-radius:5px;background:#eef2ff;color:#3730a3;font-size:.52rem;font-weight:900;line-height:1;padding:0}
.periodic-cell{width:30px;min-width:30px;max-width:30px;min-height:32px;border-radius:7px;padding:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;line-height:1}
.periodic-cell.block-s{background:#dbeafe;border:1px solid #93c5fd;color:#1d4ed8}
.periodic-cell.block-p{background:#dcfce7;border:1px solid #86efac;color:#166534}
.periodic-cell.block-d{background:#fef3c7;border:1px solid #fcd34d;color:#92400e}
.periodic-empty{width:30px;min-width:30px;max-width:30px;min-height:32px}
.periodic-note{margin-top:8px!important}
@media (max-width:980px){.periodic-grid{grid-template-columns:repeat(18,26px);gap:1px}.group-head{width:26px;min-width:26px;max-width:26px;font-size:.48rem;min-height:15px}.periodic-cell,.periodic-empty{width:26px;min-width:26px;max-width:26px;min-height:28px}.periodic-cell{font-size:.64rem;border-radius:6px}}


/* Evita que las soluciones largas del tutor se corten */
.msg,.chat-box{overflow-wrap:anywhere;word-break:normal}
.msg{white-space:normal}


/* Soluciones largas de números cuánticos: no cortar ni desbordar */
.msg,.chat-box,.feedback,.formula.light{overflow-wrap:anywhere;word-break:normal;white-space:normal}


/* Etiquetas de orbitales degenerados con subíndices */
.orb-label sub{font-size:.68em;line-height:0}


.msg sub,.work-card sub,.prompt-card sub{font-size:.72em;line-height:0;vertical-align:sub}


/* Subíndices de ml/ms */
.msg sub,.work-card sub,.prompt-card sub,label sub{font-size:.72em;line-height:0;vertical-align:sub}


/* Subíndices de números cuánticos en textos visibles */
.msg sub,.work-card sub,.prompt-card sub,label sub{font-size:.72em;line-height:0;vertical-align:sub}


/* Resultado correcto visible en Tutor químico y pizarra */
.result-inline{color:#dc2626!important;font-weight:900!important}
.feedback.good b{font-weight:900}


/* Números cuánticos: subíndices y resultados visibles */
.msg sub,.work-card sub,.prompt-card sub,label sub{font-size:.72em;line-height:0;vertical-align:sub}
.result-inline{color:#dc2626!important;font-weight:900!important}
.feedback.good b{font-weight:900}


/* Respuestas largas: permiten saltos de línea y expansión vertical */
textarea.quantum-long-answer{
  min-height:92px;
  resize:vertical;
  overflow:auto;
  line-height:1.25;
}

</style>

      <div id="inputArea" class="input-area"></div>
    </aside>
  </div>

</main>

function normalizeConfig(s){return normalizeAccents(s||'').replace(/\[/g,' [').replace(/\]/g,'] ').replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]/g,ch=>REV_SUPER[ch]||ch).replace(/\^/g,'').replace(/([spdf])\s+(\d)/gi,'$1$2').replace(/,/g,' ').replace(/\s+/g,' ').trim()}
function parseTokens(s){const str=normalizeConfig(s); const out=[]; const re=/(\d)([spdf])(\d{1,2})/gi; let m; while((m=re.exec(str))!==null) out.push(`${m[1]}${m[2].toLowerCase()}${Number(m[3])}`); return out}
function tokenMap(tokens){const map={}; tokens.forEach(t=>{const m=String(t).match(/^(\d[spdf])(\d{1,2})$/); if(m) map[m[1]]=(map[m[1]]||0)+Number(m[2])}); return map}
function mapsEqual(a,b){const keys=new Set([...Object.keys(a),...Object.keys(b)]); for(const k of keys){if((a[k]||0)!==(b[k]||0)) return false} return true}
function sameSeq(a,b){return a.length===b.length && a.every((x,i)=>x===b[i])}
function shellOrderTokens(tokens){return [...tokens].sort((a,b)=>{const ma=a.match(/^(\d)([spdf])(\d{1,2})$/), mb=b.match(/^(\d)([spdf])(\d{1,2})$/); if(!ma||!mb) return 0; const na=Number(ma[1]), nb=Number(mb[1]); if(na!==nb) return na-nb; return ORBITAL_ORDER[ma[2]]-ORBITAL_ORDER[mb[2]]})}
function formatElectronInput(input){let v=input.value; let start=input.selectionStart; v=v.replace(/([spdf])([0-9⁰¹²³⁴⁵⁶⁷⁸⁹]{1,2})/gi,(m,o,nums)=>o+nums.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]/g,ch=>REV_SUPER[ch]||ch).split('').map(d=>SUPER[d]||d).join('')); input.value=v; try{input.setSelectionRange(start,start)}catch(e){}}
function parseToken(t){const m=String(t).match(/^(\d)([spdf])(\d{1,2})$/); return m?{level:Number(m[1]),orbital:m[2],electrons:Number(m[3])}:null}
function finalToken(el){return el.fullTokens[el.fullTokens.length-1]}
function fullHTML(e){return tokensToHTML(e.fullTokens)}
function shellHTML(e){return tokensToHTML(shellOrderTokens(e.fullTokens))}
function shortHTML(e){return e.core ? `[${e.core}] ${tokensToHTML(e.shortTokens)}` : tokensToHTML(e.shortTokens)}
function scrollChat(){const box=$('chat'); if(!box) return; requestAnimationFrame(()=>box.scrollTop=box.scrollHeight); setTimeout(()=>box.scrollTop=box.scrollHeight,60)}
function scrollWork(){const w=$('work'); if(!w) return; requestAnimationFrame(()=>w.scrollTop=w.scrollHeight); setTimeout(()=>w.scrollTop=w.scrollHeight,60)}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function formatQuantumSymbolsInHTML(html){
  return String(html||'')
    .replace(/m\s*_\s*l/gi,'m<sub>l</sub>')
    .replace(/m\s*_\s*s/gi,'m<sub>s</sub>')
    .replace(/\bml\b/gi,'m<sub>l</sub>')
    .replace(/\bms\b/gi,'m<sub>s</sub>')
    .replace(/mₗ/g,'m<sub>l</sub>')
    .replace(/mₛ/g,'m<sub>s</sub>');
}
function formatQuantumSymbolsText(s){
  return formatQuantumSymbolsInHTML(escapeHtml(s));
}
function prettifyQuantumInputText(v){
  return String(v||'')
    .replace(/m\s*_\s*l/gi,'mₗ')
    .replace(/m\s*_\s*s/gi,'mₛ')
    .replace(/\bml\b/gi,'mₗ')
    .replace(/\bms\b/gi,'mₛ');
}
function attachQuantumSubscriptInputs(root=document){
  root.querySelectorAll('input,textarea').forEach(el=>{
    if(el.dataset.quantumSubscriptAttached) return;
    el.dataset.quantumSubscriptAttached='1';
    const handler=()=>{
      const start=el.selectionStart, end=el.selectionEnd;
      const old=el.value;
      const val=prettifyQuantumInputText(old);
      if(val!==old){
        el.value=val;
        try{
          const delta=val.length-old.length;
          el.setSelectionRange(Math.max(0,(start||0)+delta),Math.max(0,(end||0)+delta));
        }catch(e){}
      }
    };
    el.addEventListener('input',handler);
    el.addEventListener('blur',handler);
  });
}

// ---------------- CONFIGURACIÓN ELECTRÓNICA ----------------
function openConfigModule(){showElementPicker()}
function renderConfigButtons(){setTopButtons(`${homeButton()}<button class="ghost" onclick="restartConfig()">Reiniciar</button><button class="primary" onclick="startConfig(randomElement(),false)">Aleatorio sin Z</button><button class="warn" onclick="startConfig(randomElement(),true)">Estudiar con Z</button><button class="blue" onclick="showElementPicker()">Todos los elementos</button>`)}
function randomElement(){return ELEMENTS[Math.floor(Math.random()*ELEMENTS.length)]}
function startConfig(el,showZ){clearAll(); state.module='config'; state.el=el; state.showZ=showZ; state.step=0; renderConfigButtons(); renderConfigPrompt(); renderConfigStep(); addTutor('Vamos a determinar la configuración electrónica y algunos aspectos de la configuración electrónica. Primero estableceremos su periodo, grupo y bloque.')}
function restartConfig(){if(state.el) startConfig(state.el,state.showZ); else startConfig(randomElement(),false)}
function renderConfigPrompt(){const e=state.el; setPrompt(`<div class="atom-badge"><div class="sym">${e.symbol}</div>${state.showZ?`<div class="z">Z = ${e.z}</div>`:''}</div><div class="prompt-main"><h3>${e.name}</h3><div class="chips"><span class="chip gray">Periodo</span><span class="chip gray">Grupo</span><span class="chip gray">Bloque</span>${e.isException?'<span class="chip warn">posible excepción</span>':''}</div></div>`)}
function buildPeriodicPicker(){
  const groups=Array.from({length:18},(_,i)=>i+1);
  const periods=[1,2,3,4,5,6,7];
  const headers=groups.map(g=>`<div class="group-head">${g}</div>`).join('');
  const cells=[];
  periods.forEach(p=>{
    groups.forEach(g=>{
      const el=ELEMENTS.find(e=>e.period===p && String(e.groupId)===String(g));
      if(el){
        cells.push(`<button class="periodic-cell block-${el.block}" title="${el.z} · ${eSafe(el.name)} (${el.symbol})" onclick="startPickedElement('${el.symbol}')">${el.symbol}</button>`);
      }else{
        cells.push('<div class="periodic-empty"></div>');
      }
    });
  });
  return `<div class="periodic-picker-wrap"><div class="periodic-grid">${headers}${cells.join('')}</div></div>`;
}
function eSafe(s){return String(s).replace(/"/g,'&quot;')}
function startPickedElement(sym){const mode=$('pickMode')?$('pickMode').value:'noz'; startConfigBySymbol(sym, mode==='z')}
function showElementPicker(){
  state.module='config'; $('stageTitle').textContent='Escoger elemento'; renderConfigButtons(); resetTutor();
  setPrompt('<h3>Selecciona el elemento</h3><p class="small">Banco organizado como tabla periódica simplificada, ordenado por grupos del 1 al 18.</p>','prompt-card home');
  const options=ELEMENTS.map(e=>`<option value="${e.symbol}">${e.z} · ${e.name} (${e.symbol})</option>`).join('');
  setWork(`<h3>Todos los elementos</h3>
    <div class="grid2">
      <div><label>Elemento</label><select id="pickEl">${options}</select></div>
      <div><label>Modo</label><select id="pickMode"><option value="noz">Sin Z</option><option value="z">Con Z</option></select></div>
    </div>
    <div class="btn-row" style="margin-top:8px"><button class="good" onclick="loadPickedElement()">Cargar elemento seleccionado</button><button class="primary" onclick="startConfig(randomElement(),false)">Aleatorio sin Z</button></div>
    <p class="small periodic-note"><b>Banco:</b> también puedes pulsar directamente sobre cualquier símbolo en la tabla.</p>
    ${buildPeriodicPicker()}`);
  addTutor('Elige un elemento en el desplegable o pulsa directamente su símbolo en la tabla periódica. Después decide si quieres practicar con número atómico o sin número atómico.');
}
function startConfigBySymbol(sym, showZ=false){const el=ELEMENTS.find(e=>e.symbol===sym); if(el) startConfig(el,showZ)}
function loadPickedElement(){const sym=$('pickEl').value; const el=ELEMENTS.find(e=>e.symbol===sym); const showZ=$('pickMode').value==='z'; startConfig(el,showZ)}
function renderConfigStep(){
  if(state.module!=='config') return;
  const hist=renderBoardHistory(); let step='';
  if(state.step===0) step=htmlPosition();
  else if(state.step===1) step=htmlEnding();
  else if(state.step===2) step=htmlFullConfig();
  else if(state.step===3) step=htmlShortConfig();
  else if(state.step===4) step=htmlValence();
  else if(state.step===5) step=htmlOrbitalDeployment();
  else if(state.step===6) step=htmlUnpaired();
  else step=htmlConfigReport();
  setWork(hist+`<div class="current-step">${step}</div>`);
}
function htmlPosition(){return `<h3>1. Sitúa el elemento</h3><div class="grid3"><div><label>Periodo</label><input id="periodInput" type="number" min="1" max="7" step="1"></div><div><label>Grupo</label><input id="groupInput" type="number" min="1" max="18" step="1"></div><div><label>Bloque</label><select id="blockInput"><option value="">Selecciona...</option><option value="s">s</option><option value="p">p</option><option value="d">d</option><option value="f">f</option></select></div></div><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkPosition()">Comprobar posición</button></div><div id="stepFeedback"></div>`}
function checkPosition(){const e=state.el; const pVal=$('periodInput').value, gVal=$('groupInput').value, b=$('blockInput').value; if(!pVal||!gVal||!b) return warnMissing(); const p=Number(pVal), g=Number(gVal); addUser(`Posición: periodo ${p}, grupo ${g}, bloque ${b}.`); const wrong=[]; if(p!==e.period) wrong.push('periodo'); if(String(g)!==String(e.groupId)) wrong.push('grupo'); if(b!==e.block) wrong.push('bloque'); const solution=`periodo ${e.period} · grupo ${e.groupId} · bloque ${e.block}`; if(!wrong.length){addBoardResult('Posición correcta',solution); advanceConfig(1)} else handleWrong('position',positionHints(e,wrong),solution,'Posición',1)}
function positionHints(e,wrong){const h=[]; if(wrong.includes('periodo')) h.push('el periodo es la fila principal; recuerda que el número de capa externa suele coincidir con esa fila en s/p.'); if(wrong.includes('grupo')) h.push('el grupo es la columna 1–18. En los bloques s y p orientan los electrones de valencia, y en el bloque d corresponde a la zona central de transición.'); if(wrong.includes('bloque')) h.push('el bloque es el subnivel característico que se llena: izquierda s, derecha p, zona central d.'); return [h.join(' '),'Revisa solo los campos marcados por la pista anterior; no cambies lo que ya era coherente.']}
function htmlEnding(){return `<h3>2. Deduce la terminación de la conf. elec.</h3><div class="grid3"><div><label>Nivel final</label><input id="endLevel" type="number" min="1" max="7"></div><div><label>Subnivel final</label><select id="endOrb"><option value="">Selecciona...</option><option value="s">s</option><option value="p">p</option><option value="d">d</option><option value="f">f</option></select></div><div><label>Electrones en ese subnivel</label><input id="endElectrons" type="number" min="1" max="14"></div></div><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkEnding()">Comprobar terminación</button></div><div id="stepFeedback"></div>`}
function checkEnding(){const e=state.el, ft=parseToken(finalToken(e)); const lvlv=$('endLevel').value, orb=$('endOrb').value, nev=$('endElectrons').value; if(!lvlv||!orb||!nev) return warnMissing(); const level=Number(lvlv), ne=Number(nev); addUser(`Terminación: ${level}${orb}${sup(ne)}.`); const wrong=[]; if(level!==ft.level) wrong.push('nivel'); if(orb!==ft.orbital) wrong.push('subnivel'); if(ne!==ft.electrons) wrong.push('electrones'); const solution=tokenToHTML(finalToken(e)); if(!wrong.length){addBoardResult('Terminación correcta',solution); advanceConfig(2)} else handleWrong('ending',endingHints(e,wrong),solution,'Terminación',2)}
function endingHints(e,wrong){const out=[]; if(wrong.includes('nivel')) out.push('si el bloque es d, el nivel del subnivel d suele ser periodo − 1; si es p o s, suele coincidir con el periodo.'); if(wrong.includes('subnivel')) out.push('la letra del subnivel final debe coincidir con el bloque del elemento.'); if(wrong.includes('electrones')) out.push('cuenta cuántas posiciones se avanza dentro del bloque, y vigila posibles excepciones s/d.'); return [out.join(' '), e.isException?'Este elemento está marcado como posible excepción: revisa si un electrón s se promociona al subnivel d.':'El exponente final no es el grupo completo: es el número de electrones en ese subnivel concreto.']}
function htmlFullConfig(){return `<h3>3. Escribe la configuración electrónica</h3><textarea id="configInput" oninput="formatElectronInput(this)"></textarea><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkFullConfig()">Comprobar configuración</button></div><div id="stepFeedback"></div>`}
function checkFullConfig(){const e=state.el; const raw=$('configInput').value.trim(); if(!raw) return warnMissing(); const tokens=parseTokens(raw), map=tokenMap(tokens), expected=tokenMap(e.fullTokens); const moeller=e.fullTokens, shell=shellOrderTokens(e.fullTokens); const okMap=mapsEqual(map,expected), okOrder=sameSeq(tokens,moeller)||sameSeq(tokens,shell); addUser(`Configuración: <span class="formula light">${raw}</span>`); const solution=`Moeller/Madelung: ${fullHTML(e)}<br>Orden por capas: ${shellHTML(e)}`; if(okMap&&okOrder){addBoardResult('Configuración correcta',solution,e.isException?e.exceptionNote:''); advanceConfig(3)} else {let hints=configHints(e,okMap); handleWrong('fullconfig',hints,solution,'Configuración',3,e.isException?e.exceptionNote:'')}}
function configHints(e,okMap){return [okMap?'Los subniveles son correctos, pero el orden no corresponde claramente ni al orden energético ni al orden por capas.':(state.showZ?`Suma los superíndices: deben sumar Z = ${e.z}.`:'Suma los superíndices y revisa que todos los subniveles correspondan al elemento.'), e.isException?'Posible excepción s/d: en algunos metales de transición la separación energética entre ns y (n−1)d es pequeña.':'Recuerda Aufbau: 4s antes de 3d, 5s antes de 4d, 6s antes de 4f y 5d.']}
function htmlShortConfig(){return `<h3>4. Escribe la configuración abreviada con gas noble</h3><textarea id="shortInput" oninput="formatElectronInput(this)"></textarea><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkShortConfig()">Comprobar abreviada</button></div><div id="stepFeedback"></div>`}
function checkShortConfig(){const e=state.el; const raw=$('shortInput').value.trim(); if(!raw) return warnMissing(); addUser(`Abreviada: <span class="formula light">${raw}</span>`); const solution=shortHTML(e); let coreOk=true, tokens=parseTokens(raw); if(e.core) coreOk=new RegExp('\['+e.core+'\]','i').test(normalizeConfig(raw)); const shortMap=tokenMap(tokens), expectedMap=tokenMap(e.shortTokens); const ok=coreOk && mapsEqual(shortMap,expectedMap); if(ok){addBoardResult('Configuración abreviada correcta',solution,e.isException?e.exceptionNote:''); advanceConfig(4)} else handleWrong('shortconfig',[e.core?`El gas noble anterior debe ser [${e.core}].`:'Este elemento no tiene gas noble anterior en la notación abreviada escolar.', e.isException?'Después del gas noble, revisa posible excepción s/d.':'Después del gas noble solo debes escribir los subniveles restantes.'],solution,'Configuración abreviada',4,e.isException?e.exceptionNote:'')}
function htmlValence(){return `<h3>5. Capa y electrones de valencia</h3><div class="grid3"><div><label>Capa de valencia</label><input id="valShell" type="number" min="1" max="7"></div><div><label>Subniveles de valencia ocupados</label><input id="valTokens" type="text" oninput="formatElectronInput(this)"><p class="small">Escribe nivel + subnivel + electrones: no basta poner solo s, p o d.</p></div><div><label>Electrones de valencia</label><input id="valElectrons" type="number" min="0" max="8"></div></div><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkValence()">Comprobar valencia</button></div><div id="stepFeedback"></div>`}
function checkValence(){const e=state.el; const shv=$('valShell').value, valRaw=$('valTokens').value.trim(), nev=$('valElectrons').value; if(!shv||nev===''||(e.valenceTokens.length && !valRaw)) return warnMissing(); const shell=Number(shv), toks=parseTokens(valRaw), ne=Number(nev); addUser(`Valencia: n=${shell}, subniveles ${valRaw||'ninguno'}, electrones ${ne}.`); const emptyOk=!e.valenceTokens.length && ['','ninguna','ninguno','sin electrones','sin electrones ns','0','cero'].includes(normalizeAnswer(valRaw)); const valOk=e.valenceTokens.length?mapsEqual(tokenMap(toks),tokenMap(e.valenceTokens)):emptyOk; const solution=`n = ${e.valenceShell} · ${e.valenceTokens.length?tokensToHTML(e.valenceTokens):'sin electrones ns'} · ${e.valenceElectrons} e⁻`; if(shell===e.valenceShell && valOk && ne===e.valenceElectrons){addBoardResult('Valencia correcta',solution); advanceConfig(5)} else handleWrong('valence',valenceHints(e,valRaw),solution,'Valencia',5)}
function valenceHints(e,raw){return [/^[spdf]$/i.test(raw.trim())?'No basta con escribir la letra del subnivel: debes escribirlo completo, por ejemplo 5s¹.':'La capa de valencia es la de mayor número principal n.', 'En elementos de transición, aquí se piden como valencia solo los subniveles ocupados de la capa externa ns; el d interno se trabaja después como orbital activo. Si no hay electrones ns, escribe 0 electrones y ningún subnivel ns.']}

function orbitalDegenerateLabel(level,orbital,i){
  const labels={
    s:['s'],
    p:['p<sub>x</sub>','p<sub>y</sub>','p<sub>z</sub>'],
    d:['d<sub>xy</sub>','d<sub>yz</sub>','d<sub>zx</sub>','d<sub>x²−y²</sub>','d<sub>z²</sub>'],
    f:['f<sub>z³</sub>','f<sub>xz²</sub>','f<sub>yz²</sub>','f<sub>z(x²−y²)</sub>','f<sub>xyz</sub>','f<sub>x(x²−3y²)</sub>','f<sub>y(3x²−y²)</sub>']
  };
  const lab=(labels[orbital]&&labels[orbital][i])?labels[orbital][i]:`${orbital}${i+1}`;
  return `${level}${lab}`;
}

function expectedOccupancies(token){const t=parseToken(token); if(!t) return []; const boxes={s:1,p:3,d:5,f:7}[t.orbital]; const arr=new Array(boxes).fill(0); let e=t.electrons; for(let i=0;i<boxes&&e>0;i++,e--) arr[i]=1; for(let i=0;i<boxes&&e>0;i++,e--) arr[i]=2; return arr}
function htmlOrbitalDeployment(){const e=state.el; const rows=e.activeTokens.map((t,idx)=>{const pt=parseToken(t); const boxes={s:1,p:3,d:5,f:7}[pt.orbital]; let inputs=''; for(let i=0;i<boxes;i++) inputs+=`<div class="orb-box"><div class="orb-label">${orbitalDegenerateLabel(pt.level,pt.orbital,i)}</div><input id="orb_${idx}_${i}" type="number" min="0" max="2" step="1" style="text-align:center"></div>`; return `<div style="margin-bottom:12px"><b>${tokenToHTML(t)}</b><div class="box-row" style="margin-top:6px">${inputs}</div></div>`}).join(''); return `<h3>6. Determinación del nº de electrones desapareados</h3><h4>a) Despliega los orbitales degenerados en energía de los subniveles activos</h4><p class="small">Escribe 0, 1 o 2 electrones en cada caja aplicando Hund: primero se ocupan orbitales degenerados de forma desapareada y después se emparejan.</p>${rows}<div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkOrbitalDeployment()">Comprobar orbitales</button></div><div id="stepFeedback"></div>`}
function checkOrbitalDeployment(){const e=state.el; let allFilled=true, ok=true, shown=[]; e.activeTokens.forEach((t,idx)=>{const exp=expectedOccupancies(t); const vals=exp.map((_,i)=>{const v=$(`orb_${idx}_${i}`).value; if(v==='') allFilled=false; return Number(v)}); if([...vals].sort().join(',')!==[...exp].sort().join(',')) ok=false; shown.push(`${tokenToHTML(t)}: ${vals.map(v=>v===2?'↑↓':v===1?'↑':'_').join(' | ')}`)}); if(!allFilled) return warnMissing(); addUser(`Orbitales: ${shown.join(' ; ')}`); const solution=e.activeTokens.map(t=>`${tokenToHTML(t)}: ${expectedOccupancies(t).map(v=>v===2?'↑↓':v===1?'↑':'_').join(' | ')}`).join('<br>'); if(ok){addBoardResult('Orbitales activos correctos',solution); advanceConfig(6)} else handleWrong('orbitals',['Hund: antes de emparejar, coloca un electrón en cada orbital degenerado disponible.','Pauli: cada caja puede contener como máximo dos electrones con espines opuestos.'],solution,'Orbitales activos',6)}
function unpairedCount(e){let total=0; e.activeTokens.forEach(t=>expectedOccupancies(t).forEach(v=>{if(v===1) total++})); return total}
function htmlUnpaired(){return `<h3>7. Deduce el número de electrones desapareados</h3><div><label>Número de electrones desapareados</label><input id="unpairedInput" type="number" min="0" max="20"></div><div class="btn-row" style="margin-top:8px"><button class="good" onclick="checkUnpaired()">Comprobar desapareados</button></div><div id="stepFeedback"></div>`}
function checkUnpaired(){const e=state.el; const v=$('unpairedInput').value; if(v==='') return warnMissing(); const n=Number(v), sol=unpairedCount(e); addUser(`Electrones desapareados: ${n}.`); if(n===sol){addBoardResult('Electrones desapareados correctos',`${sol}`); advanceConfig(7)} else handleWrong('unpaired',['Cuenta las cajas que tienen un solo electrón, no las que tienen pareja.','Los orbitales degenerados se llenan desapareados antes de emparejar según Hund.'],`${sol}`,'Electrones desapareados',7)}
function htmlConfigReport(){const e=state.el; return `<h3>Resumen del caso</h3><p><b>${e.name}</b>${state.showZ?` · Z = ${e.z}`:''}</p><p>Posición: <span class="result-inline">periodo ${e.period} · grupo ${e.groupId} · bloque ${e.block}</span></p><p>Terminación: <span class="result-inline">${tokenToHTML(finalToken(e))}</span></p><p>Configuración completa: <span class="result-inline">${fullHTML(e)}</span></p><p>Abreviada: <span class="result-inline">${shortHTML(e)}</span></p><p>Valencia: <span class="result-inline">n = ${e.valenceShell} · ${e.valenceTokens.length?tokensToHTML(e.valenceTokens):'sin electrones ns'} · ${e.valenceElectrons} e⁻</span></p><p>Orbitales activos: <span class="result-inline">${e.activeTokens.map(t=>tokenToHTML(t)).join(' + ')}</span></p><p>Electrones desapareados: <span class="result-inline">${unpairedCount(e)}</span></p><div class="btn-row"><button class="primary" onclick="startConfig(randomElement(),false)">Otro aleatorio sin Z</button><button class="warn" onclick="startConfig(randomElement(),true)">Otro aleatorio con Z</button><button class="blue" onclick="showElementPicker()">Todos los elementos</button></div>`}
function advanceConfig(step){setTimeout(()=>{state.step=step; state.hints={}; renderConfigStep()},350)}
function handleWrong(key,hints,solutionHtml,label,nextStep,note=''){state.hints[key]=(state.hints[key]||0)+1; const n=state.hints[key]; if(n<=2){addTutor(`<b>Intento ${n}/3.</b> <b>Pista ${n}/2:</b> ${hints[n-1]||hints[0]}`)} else {addTutor(`Tercer intento: solución correcta de ${label.toLowerCase()}: <span class="result-inline">${solutionHtml}</span>${note?`<br>${note}`:''}`); addBoardResult(`${label} correcta`,solutionHtml,note,false); setTimeout(()=>{state.step=nextStep; state.hints={}; renderConfigStep()},700)}}

uli_hund"},{"id":"pauli_hund_decision_3","title":"Aplica Pauli y Hund","question":"Decide si cada distribución de dos electrones es posible. Usa el desplegable posible/imposible. En la segunda casilla escribe Pauli si es imposible; excitada/Hund si es posible pero no sería fundamental; ninguna si no falla.","fields":[{"id":"a_class","label":"a) d²: ↑ | ↑ | _ | _ | _: posible/imposible","kind":"choice","expected":["posible","possible"],"options":["posible","imposible"]},{"id":"a_detail","label":"a) regla/estado: Pauli si es imposible; excitada/Hund si es posible pero no fundamental; ninguna si no falla","kind":"text","expected":["ninguna","ninguno","no falla","correcto","posible","no se incumple ninguna","ninguna magnitud"],"type":"select","options":["ninguna","Hund","Pauli"]},{"id":"b_class","label":"b) d²: ↑ | ↓ | _ | _ | _: posible/imposible","kind":"choice","expected":["posible","possible"],"options":["posible","imposible"]},{"id":"b_detail","label":"b) regla/estado: Pauli si es imposible; excitada/Hund si es posible pero no fundamental; ninguna si no falla","kind":"text","expected":["excitada","excitado","hund","regla de hund","no fundamental","estado excitado","posible excitada","posible pero excitada"],"type":"select","options":["ninguna","Hund","Pauli"]},{"id":"c_class","label":"c) d²: ↑↓ | _ | _ | _ | _: posible/imposible","kind":"choice","expected":["posible","possible"],"options":["posible","imposible"]},{"id":"c_detail","label":"c) regla/estado: Pauli si es imposible; excitada/Hund si es posible pero no fundamental; ninguna si no falla","kind":"text","expected":["excitada","excitado","hund","regla de hund","no fundamental","estado excitado","posible excitada","posible pero excitada"],"type":"select","options":["ninguna","Hund","Pauli"]},{"id":"d_class","label":"d) d²: ↑↑ | _ | _ | _ | _: posible/imposible","kind":"choice","expected":["imposible","not possible","incorrecta","incorrect"],"options":["posible","imposible"]},{"id":"d_detail","label":"d) regla/ function openQuantumModule(){
  clearAll();
  state.module='quantum';
  $('stageTitle').textContent='Números cuánticos';
  setTopButtons(`${homeButton()}<button class="primary" onclick="newQuantumExercise()">Nuevo ejercicio</button><button class="ghost" onclick="restartQuantumExercise()">Reiniciar</button>`);
  setPrompt(`<div class="mini-title">Números cuánticos</div><div class="mini-sub">${Q_EXERCISES.length} ejercicios corregidos: n · l · mₗ · mₛ · orbitales · Pauli/Hund.</div>`,'prompt-card home quantum-intro');
  addTutor(`Módulo de números cuánticos: ${Q_EXERCISES.length} ejercicios, con los conjuntos posible/imposible corregidos.`);
  newQuantumExercise(false);
}
function newQuantumExercise(reset=true){
  if(reset) resetTutor();
  state.hints={};
  state.q=Q_EXERCISES[Math.floor(Math.random()*Q_EXERCISES.length)];
  renderQuantumExercise();
  addTutor('Resuelve el ejercicio. En casillas con varios valores, sepáralos por comas o espacios; el signo + es opcional. Reglas: l = 0…n−1; mₗ = −l…+l; mₛ = ±1/2.');
}
function restartQuantumExercise(){
  if(state.q){
    state.hints={};
    resetTutor();
    renderQuantumExercise();
    addTutor('Reiniciamos el mismo ejercicio.');
  } else {
    newQuantumExercise();
  }
}
function renderQuantumExercise(){
  const q=state.q;
  if(!q) return;
  $('stageTitle').textContent='Números cuánticos';
  const fieldsHTML=q.fields.map(f=>`
    <div class="q-field">
      <label>${formatQuantumSymbolsInHTML(escapeHtml(f.label))}</label>
      ${quantumFieldInputHTML(f)}
    </div>`).join('');
  setPrompt(`<div class="mini-title">Números cuánticos</div><div class="mini-sub">${Q_EXERCISES.length} ejercicios corregidos: n · l · mₗ · mₛ · orbitales · Pauli/Hund.</div>`, 'prompt-card home compact-intro quantum-intro');
  setWork(`<div class="quantum-work">
    <h3>${escapeHtml(q.title)}</h3>
    <p class="q-question">${formatQuantumSymbolsInHTML(escapeHtml(q.question))}</p>
    ${quantumHelp(q)}
    <div class="q-grid ${q.fields.length>6?'many':''}">${fieldsHTML}</div>
    <div class="btn-row quantum-actions"><button class="good" onclick="checkQuantumExercise()">Comprobar</button><button class="primary" onclick="newQuantumExercise()">Otro ejercicio</button></div>
    <div id="stepFeedback"></div>
  </div>`);
}

function parseNums(s){const txt=String(s||'').replace(/[−–—]/g,'-').replace(/\+/g,'+');const out=[];const re=/[+-]?\d+(?:\.\d+)?(?:\s*\/\s*[+-]?\d+(?:\.\d+)?)?/g;let m;while((m=re.exec(txt))!==null){const tok=m[0].replace(/\s+/g,'');let v;if(tok.includes('/')){const [a,b]=tok.split('/').map(Number);if(Number.isNaN(a)||Number.isNaN(b)||b===0)continue;v=a/b;}else{v=Number(tok);}if(!Number.isNaN(v))out.push(v);}return out;}
function valuesFromText(s){return parseNums(s)}
function sameNumSet(input,expected){const a=valuesFromText(input).sort((x,y)=>x-y),b=[...expected].sort((x,y)=>x-y);return a.length===b.length&&a.every((x,i)=>x===b[i])}
function checkSpinPairAnswer(val){const raw=normalizeAnswer(val);if(['opuestos','opuesto','antiparalelos','antiparalelo','contrarios','contrario','ms opuestos','mₛ opuestos','+1/2 y -1/2','-1/2 y +1/2','1/2 y -1/2','-1/2 y 1/2'].includes(raw))return true;const s=normalizeText(val).replace(/[−–—]/g,'-').replace(/\+/g,'').replace(/mₛ|ms/g,'').replace(/[()]/g,' ').replace(/,/g,' ').replace(/;/g,' ').replace(/y/g,' ').replace(/\s+/g,' ').trim();const vals=[];const re=/-?\s*1\s*\/\s*2/g;let m;while((m=re.exec(s))!==null){vals.push(m[0].replace(/\s+/g,''));}if(vals.length!==2)return false;const nums=vals.map(x=>x.startsWith('-')?-0.5:0.5);return nums.includes(0.5)&&nums.includes(-0.5);}
function boxAnswerEquivalentToExpectedAny(raw, expectedList){
  if(!/[↑↓|_]/.test(String(raw||''))) return false;
  const got=parseBoxParts(raw);
  if(!got || got.some(p=>!p.ok)) return false;
  const gotCounts=got.map(p=>p.count).sort((a,b)=>b-a);
  const gotSingles=got.filter(p=>p.count===1).map(p=>p.single);
  if(gotSingles.length>1 && !gotSingles.every(x=>x===gotSingles[0])) return false;
  return (expectedList||[]).some(exp=>{
    if(!/[↑↓|_]/.test(String(exp||''))) return false;
    const e=parseBoxParts(exp);
    if(!e || e.some(p=>!p.ok) || e.length!==got.length) return false;
    const expCounts=e.map(p=>p.count).sort((a,b)=>b-a);
    return gotCounts.length===expCounts.length && gotCounts.every((v,i)=>v===expCounts[i]);
  });
}
function tupleTextEquivalentToExpectedAny(raw, expectedList){
  const got=parseNums(raw);
  if(!got || got.length<4) return false;
  return (expectedList||[]).some(exp=>{
    const e=parseNums(exp);
    if(!e || e.length!==got.length || e.length<4) return false;
    return e.every((v,i)=>v===got[i]);
  });
}

function parseTokensWithCore(raw){
  const str=normalizeConfig(raw||'');
  let toks=[];
  const m=str.match(/\[\s*(he|ne|ar|kr|xe|rn)\s*\]/i);
  if(m) toks=toks.concat(CORE_TOKENS[m[1].toLowerCase()]||[]);

function stripSubshellLabel(raw){return String(raw||'').replace(/^[\s\[]*\d\s*[spdf]\s*[:：=\-]?/i,'').trim();}
function parseBoxParts(raw){
  let txt=stripSubshellLabel(raw).replace(/[;，]/g,'|').replace(/\s*\|\s*/g,'|').trim();
  if(!txt) return null;
  const parts=txt.split('|').map(x=>x.trim()).filter(x=>x.length);
  return parts.map(p=>{
    let q=p.replace(/[\[\]{}()]/g,'').replace(/\s+/g,'');
    if(q===''||q==='_'||q==='–'||q==='-'||q==='0') return {count:0, single:null, ok:true};
    const ups=(q.match(/↑/g)||[]).length, downs=(q.match(/↓/g)||[]).length;
    if(ups+downs===1) return {count:1, single:ups?'up':'down', ok:true};
    if(ups===1 && downs===1 && ups+downs===2) return {count:2, single:null, ok:true};
    return {count:NaN, single:null, ok:false};
  });
}

function boxDiagramOk(raw, sub, electrons){
  const nBoxes=degeneracyOfSubshellLetter(String(sub).slice(-1));
  const parts=parseBoxParts(raw);
  if(!parts || parts.length!==nBoxes || parts.some(p=>!p.ok)) return false;
  if(parts.reduce((a,p)=>a+p.count,0)!==electrons) return false;
  if(parts.some(p=>p.count>2)) return false;
  const got=parts.map(p=>p.count).sort((a,b)=>b-a), exp=hundCounts(nBoxes,electrons);
  if(got.length!==exp.length || got.some((v,i)=>v!==exp[i])) return false;
  const singles=parts.filter(p=>p.count===1).map(p=>p.single);
  if(singles.length>1 && !singles.every(x=>x===singles[0])) return false;
  return true;
}
function canonicalBoxDiagram(sub,electrons){
  const nBoxes=degeneracyOfSubshellLetter(String(sub).slice(-1));
  const counts=hundCounts(nBoxes,electrons);
  const boxes=counts.map(c=>c===2?'↑↓':c===1?'↑':'_');
  return `${sub}: ${boxes.join(' | ')}`;
}

function newStateExercise(reset=true){if(reset) resetTutor(); state.hints={}; state.cfgState=STATE_EXERCISES[Math.floor(Math.random()*STATE_EXERCISES.length)]; renderStateExercise(); addTutor('Lee las instrucciones del recuadro naranja. Elige fundamental, excitado o incorrecto. Si no es fundamental, completa la segunda casilla con lo que se pide: configuración fundamental o diagrama fundamental del subnivel.')}

function degeneracyOfSubshellLetter(letter){return {s:1,p:3,d:5,f:7}[String(letter).toLowerCase()]||0}
function tokenKey(t){const m=String(t).match(/^(\d[spdf])\d{1,2}$/i); return m?m[1].toLowerCase():''}
function tokenElectrons(t){const m=String(t).match(/^(\d[spdf])(\d{1,2})$/i); return m?Number(m[2]):0}
function tokenCapacity(t){const m=String(t).match(/^(\d)([spdf])(\d{1,2})$/i); return m?CAPACITY[m[2].toLowerCase()]:0}
function configElectronCount(tokens){return (tokens||[]).reduce((a,t)=>a+tokenElectrons(t),0)}
function renderStateExercise(){
  const q=state.cfgState; const isBoxes=q.type==='boxes';
  const content=isBoxes?`<p>Especie: <b>${q.species}</b></p><p>Configuración clásica dada: <span class="formula light">${configToDisplayHTML(q.config)}</span></p><p>Diagrama a clasificar: <span class="formula light">${diagramToDisplayHTML(q.diagram)}</span></p>`:`<p>Configuración a clasificar: <span class="formula light">${configToDisplayHTML(q.config)}</span></p>`;

  const help=isBoxes?`<div class="feedback warn"><b>Responder:</b> clasifica. Si no es fundamental, escribe <b>solo el diagrama fundamental de ${shownSub||'subnivel'}</b>. ${typingGuide}<br><b>Formato:</b> ${shownSub||'2p'}: ↑ | ↑ | _ · <b>No uses</b> 3d¹ 3d¹..., porque no indica espines.</div>`:`<div class="feedback warn"><b>Responder:</b> clasifica. Si no es fundamental, escribe la <b>configuración fundamental completa</b>. Puedes escribir <b>1s2 2s2</b> o <b>1s² 2s²</b>.</div>`;
  const label=isBoxes?`Diagrama fundamental de ${shownSub||'subnivel'}, si procede. Usa ↑, ↓, ↑↓, | y _ (Alt+24/25, AltGr+1)`:'Configuración electrónica fundamental, si procede';

function extractBoxAnswer(raw){
  let s=(raw||'').trim().replace(/;/g,'|').replace(/,/g,'|'); if(!s) return null;
  let label=''; const m=s.match(/(\d[spdf])\s*:/i); if(m){label=m[1].toLowerCase(); s=s.slice(s.indexOf(':')+1)}
  const boxes=s.split('|').map(x=>x.trim()).filter(x=>x.length);
  return boxes.length?{label,boxes}:null;
}
function boxInfo(box){const up=(box.match(/↑/g)||[]).length, down=(box.match(/↓/g)||[]).length; return {up,down,count:up+down}}
function boxesRespectPauli(boxes){return boxes.every(b=>{const x=boxInfo(b); return x.count<=2 && !(x.count===2 && (x.up===2||x.down===2));})}
function boxDistributionIsHund(boxes,e,deg){
  if(boxes.length!==deg || !boxesRespectPauli(boxes)) return false;
  const infos=boxes.map(boxInfo), counts=infos.map(x=>x.count).sort((a,b)=>b-a);
  const pairs=Math.max(0,e-deg), singles=e<=deg?e:deg-pairs, empties=Math.max(0,deg-pairs-singles);
  const expected=[...Array(pairs).fill(2),...Array(singles).fill(1),...Array(empties).fill(0)].sort((a,b)=>b-a);
  if(counts.join(',')!==expected.join(',')) return false;
  const singleSigns=infos.filter(x=>x.count===1).map(x=>x.up?'+':'-');
  return singleSigns.length<=1 || singleSigns.every(s=>s===singleSigns[0]);
}
function groundDiagramSolution(q){
  if(!q || q.type!=='boxes') return ''; const rawShown=(q.diagram.match(/(\d[spdf])\s*:/i)||[])[1]; const shown=rawShown ? rawShown.toLowerCase() : ''; if(!shown) return '';
  const expectedToken=(q.ground||[]).find(t=>tokenKey(t)===shown); if(!expectedToken) return '';
  const e=tokenElectrons(expectedToken), deg=degeneracyOfSubshellLetter(shown.slice(-1)); const boxes=[]; const pairs=Math.max(0,e-deg); const singles=e<=deg?e:deg-pairs;
  for(let i=0;i<deg;i++){if(i<pairs) boxes.push('↑↓'); else if(i<pairs+singles) boxes.push('↑'); else boxes.push('_')}
  return `${shown}: ${boxes.join(' | ')}`;
}
function groundDiagramOk(raw,q){
  if(!q || q.type!=='boxes') return false; const ans=extractBoxAnswer(raw); if(!ans) return false;
  const rawShown=(q.diagram.match(/(\d[spdf])\s*:/i)||[])[1]; const shown=rawShown ? rawShown.toLowerCase() : ''; const key=(ans.label || shown || '').toLowerCase(); if(!key || (shown && key!==shown)) return false;
  const expectedToken=(q.ground||[]).find(t=>tokenKey(t)===key); if(!expectedToken) return false;
  return boxDistributionIsHund(ans.boxes, tokenElectrons(expectedToken), degeneracyOfSubshellLetter(key.slice(-1)));
}
function hasDuplicateTokenKeys(tokens){const seen=new Set(); for(const t of tokens){const k=tokenKey(t); if(seen.has(k)) return true; seen.add(k)} return false}
function groundAnswerOk(raw,q){
  if(q.type==='boxes') return groundDiagramOk(raw,q);
  const tok=parseTokensWithCore(raw); return tok.length && !hasDuplicateTokenKeys(tok) && mapsEqual(tokenMap(tok), tokenMap(q.ground));
}
function stateExplanation(q){return `Justificación: ${htmlifyConfigText(q.reason)}`}
function stateRuleAssessment(q){
  if(!q) return '';
  if(q.state==='fundamental'){
    if(q.type==='boxes') return ' Reglas de llenado electrónico: cumple Aufbau porque la configuración de partida corresponde al llenado fundamental del elemento; cumple Pauli porque ningún orbital supera dos electrones y los pares tienen espines opuestos; y cumple Hund porque los orbitales degenerados del subnivel mostrado se ocupan primero de forma desapareada y con espines paralelos antes de emparejar.';
    return ' Reglas de llenado electrónico: cumple Aufbau porque los subniveles se ocupan en el orden energético esperado; cumple Pauli porque no se supera la capacidad máxima de ningún subnivel/orbital; y, al representarla en cajas orbitales, cumple Hund porque los electrones de subniveles degenerados se distribuyen de forma desapareada y con espines paralelos antes de emparejar.';
  }
  if(q.state==='incorrecto'){
    if(q.type==='config'){
      const bad=(parseTokens(q.config)||[]).find(t=>tokenElectrons(t)>tokenCapacity(t));
      if(bad){
        const key=tokenKey(bad), letter=key.slice(-1), cap=CAPACITY[letter];
        const label=letter==='s'?'un subnivel s/orbital s':`un subnivel ${letter}`;
        return ` Regla que no se cumple: principio de exclusión de Pauli/capacidad máxima; ${label} solo admite ${cap} electrones como máximo.`;
      }
      return ' Regla que no se cumple: hay exceso de capacidad en algún orbital o subnivel, por lo que se viola Pauli.';
    }
    if((q.diagram||'').includes('↑↓↑')) return ' Regla que no se cumple: principio de exclusión de Pauli, porque un mismo orbital contiene tres electrones.';
    if((q.diagram||'').includes('↑↑')) return ' Regla que no se cumple: principio de exclusión de Pauli, porque dos electrones del mismo orbital tienen el mismo espín.';
    return ' Regla que no se cumple: principio de exclusión de Pauli.';
  }
  if(q.state==='excitado'){
    if(q.type==='boxes') return ' Regla que no corresponde al estado fundamental: Hund; Pauli sí se cumple, pero no se maximiza la ocupación desapareada con espines paralelos antes de emparejar.';
    if((q.reason||'').toLowerCase().includes('excepción')) return ' Regla/criterio afectado: excepción de estabilidad s/d; no es una violación de Pauli ni de capacidad, sino que la configuración dada no es la fundamental más estable.';
    return ' Regla que no corresponde al estado fundamental: Aufbau/orden energético; hay electrones promocionados a subniveles de mayor energía antes de la distribución fundamental esperada.';
  }
  return '';
}
function specificStateHint(q,raw){
  if(q && q.type==='boxes' && raw){const tok=parseTokens(raw); if(tok.length && mapsEqual(tokenMap(tok), tokenMap(q.ground))) return 'En esta actividad se evalúa el diagrama orbital: la configuración clásica no basta para comprobar Hund o Pauli. Escribe el subnivel con flechas, por ejemplo 2p: ↑ | ↑ | _.'; if(tok.length && hasDuplicateTokenKeys(tok)) return 'Escribir 2p¹ 2p¹ o 3d¹ 3d¹ separa electrones, pero no indica si los espines son paralelos u opuestos. Usa flechas y barras.'; if(raw.includes('|') && !groundDiagramOk(raw,q)) return 'Revisa el diagrama: cada orbital admite como máximo dos electrones con espines opuestos, y Hund exige ocupar degenerados desapareadamente antes de emparejar.'}
  return '';
}

}
function handleWrongState(q,solution,raw=''){state.hints.state=(state.hints.state||0)+1; const n=state.hints.state; if(n<=2){const extra=specificStateHint(q,raw); addTutor(`<b>Intento ${n}/3.</b> <b>Pista ${n}/2:</b> ${htmlifyConfigText(extra || q.hints[n-1] || q.hints[0])}`)} else {addTutor(`Tercer intento: <span class="result-inline">${solution}</span>`); setWork(`<h3>${q.title}</h3><div class="board-result"><b>Solución correcta:</b> <span class="result-inline">${solution}</span></div><div class="btn-row" style="margin-top:8px"><button class="primary" onclick="newStateExercise()">Nuevo ejercicio</button><button class="ghost" onclick="restartStateExercise()">Reiniciar</button></div>`)}}
